<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GRUPOAEC - Player</title>
<style>
:root{
--verde:#1db954;
--fundo:#121212;
--card:#181818;
}

body{
background:var(--fundo);
color:white;
font-family:Arial;
margin:0;
padding-bottom:120px;
}

header{
padding:20px;
text-align:center;
background:#000;
font-size:24px;
font-weight:bold;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
}

.card{
background:var(--card);
border-radius:10px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
}

.thumbnail{
width:100%;
height:160px;
object-fit:cover;
}

.info{
padding:10px;
text-align:center;
}

/* PLAYER */
.player{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#000;
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
box-shadow:0 -5px 20px rgba(0,0,0,0.6);
}

.music-info{
display:flex;
align-items:center;
gap:10px;
}

.music-info img{
width:50px;
height:50px;
border-radius:5px;
}

.controls{
display:flex;
gap:15px;
align-items:center;
}

.controls button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

.controls button:hover{
color:var(--verde);
}

.progress{
width:40%;
}

.progress input{
width:100%;
}
</style>
</head>
<body>

<header>GRUPOAEC 🎵</header>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player">
    <div class="music-info">
        <img id="cover" src="https://picsum.photos/seed/1/400/400">
        <div id="title">Nenhuma música selecionada</div>
    </div>

    <div class="controls">
        <button onclick="anterior()">⏮</button>
        <button onclick="playPause()" id="playBtn">▶️</button>
        <button onclick="proxima()">⏭</button>
        <button onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
    </div>

    <div class="progress">
        <input type="range" id="barra" value="0">
    </div>
</div>

<audio id="audio"></audio>

<script>
/* ====================== LISTA DE MÚSICAS ====================== */
const musicas = [
    {titulo: "Heaven", arquivo: "SpotifyMate.com - Heaven - 平田志穂子.mp3"},
    {titulo: "Jane! - The Long Faces", arquivo: "02. [SpotiSoft] Jane! - The Long Faces.mp3"},
    {titulo: "rei dos demônios", arquivo: "03. [SpotiSoft] rei dos demônios - Link do Zap, Cravinhos.mp3"},
    {titulo: "Diz A Ela", arquivo: "04. [SpotiSoft] 彼女に言って (Diz A Ela) - Lisa Ono.mp3"},
    {titulo: "hora marcada", arquivo: "05. [SpotiSoft] hora marcada - Duddz.mp3"},
    {titulo: "Pull the Trigger", arquivo: "06. [SpotiSoft] Pull the Trigger - 藤田真由美, Lotus Juice.mp3"},
    {titulo: "Sexta-feira CLTV", arquivo: "07. [SpotiSoft] Sexta-feira CLTV - A L U A D O.mp3"},
    {titulo: "Axe to Grind", arquivo: "08. [SpotiSoft] Axe to Grind - Lyn.mp3"},
    {titulo: "o dever me chama", arquivo: "09. [SpotiSoft] o dever me chama - Link do Zap.mp3"},
    {titulo: "luar", arquivo: "10. [SpotiSoft] luar - Duddz.mp3"},
    {titulo: "neblina", arquivo: "11. [SpotiSoft] neblina - thatpaullo.mp3"},
    {titulo: "20 Ligações", arquivo: "12. [SpotiSoft] 20 Ligações - Baco Exu do Blues.mp3"},
    {titulo: "Falling Behind", arquivo: "13. [SpotiSoft] Falling Behind - Laufey.mp3"},
    {titulo: "Deixa Acontecer", arquivo: "14. [SpotiSoft] Deixa Acontecer - Grupo Revelação.mp3"},
    {titulo: "Piel Canela", arquivo: "15. [SpotiSoft] Piel Canela - Cuco.mp3"},
    {titulo: "vivo ou morto", arquivo: "16. [SpotiSoft] vivo ou morto, um problema... - Zap, nabru.mp3"},
    {titulo: "Relax", arquivo: "17. [SpotiSoft] Relax - Vacations.mp3"},
    {titulo: "bossa uh", arquivo: "18. [SpotiSoft] bossa uh - potsu.mp3"},
    {titulo: "just friends", arquivo: "19. [SpotiSoft] just friends - potsu.mp3"},
    {titulo: "FLY ME TO THE MOON", arquivo: "20. [SpotiSoft] FLY ME TO THE MOON - Inst. Shiro SAGISU.mp3"},
    {titulo: "(Your Cat) Don’t Stand a Chance", arquivo: "21. [SpotiSoft] (Your Cat) Don’t Stand a Chance - mustard service.mp3"},
    {titulo: "Mystery Girl", arquivo: "22. [SpotiSoft] Mystery Girl - Housecall.mp3"},
    {titulo: "Espresso", arquivo: "23. [SpotiSoft] Espresso - Sabrina Carpenter.mp3"},
    {titulo: "青春コンプレックス", arquivo: "24. [SpotiSoft] 青春コンプレックス - 結束バンド.mp3"},
    {titulo: "Deixa Alagar", arquivo: "25. [SpotiSoft] Deixa Alagar - Ao Vivo - Grupo Revelação.mp3"},
    {titulo: "No More What Ifs", arquivo: "26. [SpotiSoft] No More What Ifs - Lyn.mp3"},
    {titulo: "BRASILIAN SKIES", arquivo: "27. [SpotiSoft] BRASILIAN SKIES - Masayoshi Takanaka.mp3"},
    {titulo: "bedrott", arquivo: "28. [SpotiSoft] bedrott - dusky demise.mp3"},
    {titulo: "Lover Is a Day", arquivo: "29. [SpotiSoft] Lover Is a Day - Cuco.mp3"},
    {titulo: "Show Me How", arquivo: "30. [SpotiSoft] Show Me How - Men I Trust.mp3"},
    {titulo: "雨降る夜の向こう", arquivo: "32.[SpotiSoft] 雨降る夜の向こう - Lamp.mp3"},
    {titulo: "Abandoned Plaza", arquivo: "33.[SpotiSoft] Abandoned Plaza - Macabre Plaza.mp3"},
    {titulo: "A Toshi no Aki", arquivo: "34.[SpotiSoft] A Toshi no Aki - Lamp.mp3"},
    {titulo: "Waiting", arquivo: "35.[SpotiSoft] Waiting - leverfall.mp3"},
    {titulo: "Machine Love", arquivo: "Machine Love.mp3"},
    {titulo: "Heart To Heart", arquivo: "SpotiDown.App - Heart To Heart - Mac DeMarco.mp3"},
    {titulo: "See You Again", arquivo: "SpotiDown.App - See You Again _feat. Kali Uchis_ - Tyler_ The Creator_ Kali Uchis.mp3"},
    {titulo: "Sugar", arquivo: "SpotiDown.App - Sugar - System Of A Down.mp3"},
    {titulo: "WILSHIRE", arquivo: "SpotiDown.App - WILSHIRE - Tyler_ The Creator.mp3"}
];

const grid = document.getElementById("grid");
const audio = document.getElementById("audio");
let currentIndex = 0;

function render(){
    grid.innerHTML = musicas.map((m, i) => `
        <div class="card" onclick="tocar(${i})">
            <img src="https://picsum.photos/seed/${i}/400/400" class="thumbnail">
            <div class="info">${m.titulo}</div>
        </div>
    `).join("");
}

function tocar(i){
    currentIndex = i;
    audio.src = musicas[i].arquivo;
    document.getElementById("title").textContent = musicas[i].titulo;
    document.getElementById("cover").src = "https://picsum.photos/seed/" + i + "/400/400";
    audio.play().catch(() => alert("Erro ao reproduzir. Verifique o nome do arquivo."));
    document.getElementById("playBtn").innerText = "⏸️";
}

function playPause(){
    if(audio.paused){
        audio.play();
        document.getElementById("playBtn").innerText = "⏸️";
    } else {
        audio.pause();
        document.getElementById("playBtn").innerText = "▶️";
    }
}

function proxima(){
    currentIndex = (currentIndex + 1) % musicas.length;
    tocar(currentIndex);
}

function anterior(){
    currentIndex = (currentIndex - 1 + musicas.length) % musicas.length;
    tocar(currentIndex);
}

function toggleShuffle(){
    alert("Modo Aleatório em breve");
}

/* Progresso */
audio.addEventListener("timeupdate", () => {
    if(audio.duration){
        document.getElementById("barra").value = (audio.currentTime / audio.duration) * 100;
    }
});

document.getElementById("barra").addEventListener("input", (e) => {
    audio.currentTime = (e.target.value / 100) * audio.duration;
});

audio.addEventListener("ended", proxima);

render();
</script>
</body>
</html>
