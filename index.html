<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal AEC - Treinamentos</title>
<style>
    body{font-family:Arial;margin:0;background:#f2f2f2;color:#333}
    #loginTela{position:fixed;top:0;left:0;width:100%;height:100%;background:#2c3e50;display:flex;justify-content:center;align-items:center;z-index:9999;}
    .login-box{background:white;padding:30px;border-radius:8px;width:280px;text-align:center;}
    .login-box input{width:100%;padding:10px;margin:10px 0;}
    .login-box button{width:100%;padding:10px;cursor:pointer;}
    
    header{background:#0a1f3d;color:white;padding:12px 20px;display:flex;align-items:center;}
    .logo{font-size:28px;font-weight:bold;}
    
    nav{display:flex;justify-content:center;gap:25px;background:#112a4a;padding:12px;}
    nav button{background:none;border:none;color:white;font-size:16px;cursor:pointer;}
    .section{display:none;padding:30px;}
    .active{display:block;}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
    .card{background:white;border-radius:8px;overflow:hidden;cursor:pointer;}
    .card img{width:100%;height:220px;object-fit:cover;}
    .card p{padding:12px;margin:0;text-align:center;font-weight:500;}

    .music-player{
        position:fixed;bottom:0;left:0;width:100%;background:#0a1f3d;color:white;
        display:flex;align-items:center;justify-content:space-between;padding:10px 15px;
    }
    .music-player button{background:none;border:none;color:white;font-size:22px;margin:0 8px;cursor:pointer;}
    .progress{width:40%;margin:0 15px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginTela">
    <div class="login-box">
        <h3>Acesso ao Portal AEC</h3>
        <input id="usuario" placeholder="Usuário">
        <input id="senha" type="password" placeholder="Senha">
        <button onclick="logar()">Entrar</button>
        <p id="erroLogin" style="color:red; margin-top:10px;"></p>
    </div>
</div>

<header>
    <div class="logo">AEC</div>
    <div style="margin-left:15px;">Portal de Treinamentos</div>
</header>

<nav>
    <button onclick="mostrar('musicas')">Cursos</button>
</nav>

<div id="musicas" class="section active">
    <h2>Cursos Internos</h2>
    <div class="grid" id="gridMusicas"></div>
</div>

<!-- PLAYER -->
<div class="music-player">
    <div style="min-width:200px;"><strong id="musicTitle">Nenhum áudio selecionado</strong></div>
    <div>
        <button onclick="anterior()">⏮</button>
        <button onclick="playPause()" id="playBtn">▶️</button>
        <button onclick="proxima()">⏭</button>
        <button onclick="toggleShuffle()" id="shuffleBtn">🔀</button>
    </div>
    <div class="progress"><input type="range" id="progressBar" value="0" style="width:100%;"></div>
    <div><input type="range" id="volume" min="0" max="1" step="0.01" value="0.8"></div>
</div>

<audio id="audio"></audio>

<script>
/* LOGIN */
function logar(){
    if(document.getElementById("usuario").value === "admin" && 
       document.getElementById("senha").value === "admin"){
        document.getElementById("loginTela").style.display = "none";
    } else {
        document.getElementById("erroLogin").innerText = "Usuário ou senha incorretos!";
    }
}

function mostrar(secao){
    document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
    document.getElementById(secao).classList.add("active");
}

/* ====================== LISTA DE MÚSICAS ====================== */

    {titulo: "hora marcada", arquivo: "05 [SpotiSoft] hora marcada - Du..."},
    {titulo: "Pull the Trigger", arquivo: "06 [SpotiSoft] Pull the Trigger.mp3"},
    {titulo: "Sexta-feira CLTV", arquivo: "07 [SpotiSoft] Axe to Grind CLTV.mp3"},
    {titulo: "Axe to Grind", arquivo: "08 [SpotiSoft] Axe to Grind CLTV.mp3"},
    {titulo: "o dever me chama", arquivo: "09 [SpotiSoft] dever me chama.mp3"},
    {titulo: "luar", arquivo: "10 [SpotiSoft] luar - Dudzk.mp3"},
    {titulo: "neblina", arquivo: "11 [SpotiSoft] neblina - thatpaull.mp3"},

    {titulo: "bossa uh", arquivo: "18 [SpotiSoft] bossa uh - potsu..."},
    {titulo: "just friends", arquivo: "19 [SpotiSoft] just friends - potsu..."},
    {titulo: "FLY ME TO THE MOON", arquivo: "20 [SpotiSoft] FLY ME TO THE M..."},
    {titulo: "(Your Cat) Don’t Stand a Chance", arquivo: "21 [SpotiSoft] (Your Cat) Don’t St..."},
    {titulo: "Mystery Girl", arquivo: "22 [SpotiSoft] Mystery Girl - Hou..."},

    {titulo: "See You Again", arquivo: "SpotiDown.App - See You Again _feat. Kali Uchis_ - Tyler_ The Creator_ Kali Uchis.mp3"},
    {titulo: "Sugar", arquivo: "SpotiDown.App - Sugar - System Of A Down.mp3"},
    {titulo: "WILSHIRE", arquivo: "SpotiDown.App - WILSHIRE - Tyler_ The Creator.mp3"}
];

function renderMusicas(){
    gridMusicas.innerHTML = musicas.map((m, i) => `
        <div class="card" onclick="tocar(${i})">
            <img src="https://picsum.photos/seed/${i}/400/300">
            <p>${m.titulo}</p>
        </div>
    `).join("");
}

/* Player */
const audio = document.getElementById("audio");
let currentIndex = 0;

function tocar(i){
    currentIndex = i;
    audio.src = musicas[i].arquivo;
    document.getElementById("musicTitle").innerText = musicas[i].titulo;
    audio.play();
    document.getElementById("playBtn").innerText = "⏸️";
}

function playPause(){
    if(audio.paused){
        audio.play();
        document.getElementById("playBtn").innerText = "⏸️";
    } else {
        audio.pause();
        document.getElementById("playBtn").innerText = "▶️";
    }
}

function proxima(){
    currentIndex = (currentIndex + 1) % musicas.length;
    tocar(currentIndex);
}

function anterior(){
    currentIndex = (currentIndex - 1 + musicas.length) % musicas.length;
    tocar(currentIndex);
}

/* Inicialização */
renderMusicas();
</script>
</body>
</html>
